services:
  - type: web
    name: mycrm-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health/ready
    preDeployCommand: uv run alembic upgrade head
    envVars:
      - key: MYCRM_APP_ENV
        value: production
      - key: MYCRM_DATABASE_URL
        fromDatabase:
          name: mycrm-db
          property: connectionString
      - key: MYCRM_SECRET_KEY
        generateValue: true
      - key: MYCRM_CORS_ORIGINS
        value: '["https://mycrm-web.onrender.com"]'
      - key: MYCRM_ALLOWED_HOSTS
        value: '["mycrm-api.onrender.com"]'
      - key: MYCRM_ENABLE_DOCS
        value: "true"
      - key: MYCRM_DEMO_ENABLED
        value: "true"
      - key: MYCRM_DEMO_READ_ONLY
        value: "true"
      - key: MYCRM_REGISTRATION_ENABLED
        value: "false"

  - type: web
    name: mycrm-web
    runtime: static
    rootDir: frontend
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://mycrm-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: mycrm-db
    databaseName: mycrm
    user: mycrm
