name: mycrm

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mycrm}
      POSTGRES_USER: ${POSTGRES_USER:-mycrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: ./backend
    command: ["sh", "-c", "alembic upgrade head && fastapi run --host 0.0.0.0 --port 8000"]
    environment:
      MYCRM_APP_ENV: local
      MYCRM_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mycrm}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-mycrm}
      MYCRM_CORS_ORIGINS: '["http://localhost:5173", "http://localhost:8080"]'
      MYCRM_ALLOWED_HOSTS: '["localhost", "127.0.0.1", "api", "test"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
