name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: mycrm_test
          POSTGRES_USER: mycrm
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mycrm -d mycrm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      MYCRM_APP_ENV: test
      MYCRM_DATABASE_URL: postgresql+asyncpg://mycrm:test-password@localhost:5432/mycrm_test
      MYCRM_TEST_DATABASE_URL: postgresql+asyncpg://mycrm:test-password@localhost:5432/mycrm_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: uv run alembic upgrade head
      - run: uv run pytest
      - run: uv run alembic downgrade base
      - run: uv run alembic upgrade head

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up --build --detach
      - name: Wait for the public web entry point
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8080/api/v1/health/ready; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs
          exit 1
      - if: always()
        run: docker compose down --volumes
